<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aplikasi Mitra Driver</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --primary: #0F4C81; --accent: #F59E0B; --bg-gray: #F8F9FA; 
            --white: #FFFFFF; --text-dark: #2D3748; --text-muted: #718096;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent;}
        body { background-color: #333; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background-color: var(--white); height: 100vh; position: relative; overflow: hidden; display: flex; flex-direction: column;}
        
        /* Header Driver */
        .driver-header { background: var(--white); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 1000; position: absolute; top: 0; width: 100%;}
        .driver-profile { display: flex; align-items: center; gap: 10px; }
        .driver-profile h3 { font-size: 15px; color: var(--text-dark); }
        .driver-profile p { font-size: 11px; color: var(--primary); font-weight: 600;}
        
        /* Toggle Online */
        .toggle-container { display: flex; align-items: center; gap: 8px; }
        .toggle-text { font-size: 12px; font-weight: 600; color: var(--text-muted); }
        .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #059669; }
        input:checked + .slider:before { transform: translateX(20px); }

        #mapDriver { flex: 1; width: 100%; z-index: 1; margin-top: 70px; }

        /* Panel Bawah (Info Saldo) */
        .bottom-panel { background: var(--white); border-radius: 20px 20px 0 0; padding: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 1000; display: flex; justify-content: space-between;}
        .earn-box { text-align: center; flex: 1; border-right: 1px solid #EAEAEA;}
        .earn-box:last-child { border-right: none; }
        .earn-box p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px;}
        .earn-box h4 { font-size: 16px; color: var(--text-dark); }

        /* Pop-Up Order Masuk */
        .order-modal { position: absolute; bottom: 20px; left: 20px; right: 20px; background: var(--white); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1005; border-top: 5px solid var(--accent); display: none; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0;} to { transform: translateY(0); opacity: 1; } }
        .order-modal h2 { font-size: 16px; color: var(--text-dark); margin-bottom: 15px; text-align: center;}
        
        .route-detail { background: var(--bg-gray); padding: 15px; border-radius: 10px; margin-bottom: 15px;}
        .r-item { margin-bottom: 10px; font-size: 13px; color: var(--text-dark); }
        .r-item:last-child { margin-bottom: 0; }
        .r-item i { width: 20px; color: var(--primary); }
        
        .price-tag { text-align: center; font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 15px;}
        
        .btn-group { display: flex; gap: 10px; }
        .btn-reject { flex: 1; padding: 14px; background: #FEE2E2; color: #E53E3E; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-accept { flex: 2; padding: 14px; background: #059669; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(5, 150, 105, 0.3); }

        /* Floating Action Button (Back to Home) */
        .fab-home { position: absolute; bottom: 100px; right: 20px; width: 50px; height: 50px; background: var(--primary-dark); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 999;}
    </style>
</head>
<body>
    <div class="app-container">
        <div class="driver-header">
            <div class="driver-profile">
                <img id="fotoDriver" src="https://ui-avatars.com/api/?name=Driver&background=0F4C81&color=fff" style="width: 40px; border-radius: 50%;">
                <div>
                    <h3 id="namaDriverHeader">Mitra Driver</h3>
                    <p>Ketuk untuk mulai online</p>
                </div>
            </div>
            <div class="toggle-container">
                <span class="toggle-text" id="statusText">Offline</span>
                <label class="switch">
                    <input type="checkbox" id="toggleOnline" onchange="ubahStatus(this)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div id="mapDriver"></div>

        <div class="bottom-panel">
            <div class="earn-box">
                <p>Pendapatan Hari Ini</p>
                <h4>Rp 125.000</h4>
            </div>
            <div class="earn-box">
                <p>Total Pesanan</p>
                <h4>8 Selesai</h4>
            </div>
        </div>

        <a href="index.html" class="fab-home"><i class="fas fa-home"></i></a>

        <!-- Pop Up Pesanan Masuk (data diisi otomatis oleh driver.js dari server) -->
        <div class="order-modal" id="orderModal">
            <h2>Pesanan Baru Masuk!</h2>
            <div class="route-detail">
                <div class="r-item"><i class="fas fa-tag"></i> Layanan: <span id="orderLayanan">-</span></div>
                <div class="r-item"><i class="fas fa-dot-circle"></i> <span id="orderJemput">-</span></div>
                <div class="r-item"><i class="fas fa-map-marker-alt" style="color: #E53E3E;"></i> <span id="orderTujuan">-</span></div>
                <div class="r-item" style="margin-top: 10px; font-weight: 600; color: #059669;"><i class="fas fa-money-bill-wave"></i> Pembayaran: <span id="orderMetode">-</span></div>
            </div>
            <div class="price-tag" id="orderHarga">Rp 0</div>
            <div class="btn-group">
                <button class="btn-reject" onclick="abaikanOrder()">Abaikan</button>
                <button class="btn-accept" onclick="terimaOrder()">Terima Order</button>
            </div>
        </div>
    </div>

    <script>
        // Inisialisasi Peta Driver
        let map = L.map('mapDriver', {zoomControl: false}).setView([-7.5333, 110.6000], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let driverMarker;

        // Titik GPS Driver asli (dipanggil ulang oleh driver.js setiap lokasi diperbarui)
        window.updateDriverMarker = function (lat, lng) {
            map.setView([lat, lng], 16);
            if (driverMarker) {
                driverMarker.setLatLng([lat, lng]);
            } else {
                driverMarker = L.marker([lat, lng]).addTo(map);
            }
        };

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                window.updateDriverMarker(position.coords.latitude, position.coords.longitude);
            });
        }

        // Tampilkan nama driver di header jika sudah pernah isi identitas
        window.addEventListener('load', function () {
            let nama = localStorage.getItem("driverName");
            if (nama) {
                document.getElementById("namaDriverHeader").innerText = nama;
                document.getElementById("fotoDriver").src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(nama) + "&background=0F4C81&color=fff";
            }
        });
    </script>
    <script src="app.js"></script>
    <script src="driver.js"></script>
</body>
</html>
