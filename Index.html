<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nganterin - Aplikasi Anda</title>
    <link rel="stylesheet" href="style.css">
    <!-- Mengambil ikon gratis dari FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header & Profil -->
    <header class="header">
        <div class="user-info">
            <h2>Halo, Budi! 👋</h2>
            <p>Mau kirim apa hari ini?</p>
        </div>
        <div class="balance-card">
            <span>Saldo Pay</span>
            <h3>Rp 50.000</h3>
        </div>
    </header>

    <!-- Menu Utama (Grid) -->
    <main class="services">
        <div class="service-item">
            <div class="icon-box"><i class="fas fa-motorcycle"></i></div>
            <span>Ride</span>
        </div>
        <div class="service-item">
            <div class="icon-box"><i class="fas fa-box"></i></div>
            <span>Send</span>
        </div>
        <div class="service-item">
            <div class="icon-box"><i class="fas fa-hamburger"></i></div>
            <span>Food</span>
        </div>
        <div class="service-item">
            <div class="icon-box"><i class="fas fa-shopping-bag"></i></div>
            <span>Mart</span>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i></a>
        <a href="#" class="nav-item"><i class="fas fa-receipt"></i></a>
        <a href="#" class="nav-item"><i class="fas fa-comment-dots"></i></a>
        <a href="#" class="nav-item"><i class="fas fa-user"></i></a>
    </nav>

</body>
</html>
