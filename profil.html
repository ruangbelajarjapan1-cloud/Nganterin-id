<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Boyolali App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #0F4C81; --primary-light: #EBF4FA; --accent: #F59E0B;
            --bg-gray: #F8F9FA; --white: #FFFFFF; --text-dark: #2D3748; --text-muted: #718096;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent;}
        body { background-color: #E5E5E5; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background-color: var(--bg-gray); min-height: 100vh; position: relative; padding-bottom: 80px; overflow-x: hidden;}
        
        .top-bar { display: flex; align-items: center; padding: 20px; background: var(--white); }
        
        /* KARTU PROFIL UTAMA (DENGAN UPLOAD FOTO) */
        .profile-card { background: var(--white); padding: 30px 20px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        
        .avatar-container { position: relative; width: 90px; height: 90px; margin: 0 auto 15px auto; }
        .avatar { width: 100%; height: 100%; background: var(--primary-light); color: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 40px; overflow: hidden; border: 3px solid var(--white); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-edit-foto { position: absolute; bottom: 0; right: 0; background: var(--accent); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; cursor: pointer; border: 2px solid var(--white); }
        
        .profile-card h2 { font-size: 20px; color: var(--text-dark); margin-bottom: 5px; font-weight: 600;}
        .profile-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 3px;}
        
        /* Daftar Menu */
        .menu-list { padding: 20px; margin-top: 10px; }
        .menu-item { background: var(--white); padding: 16px 20px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; color: var(--text-dark); text-decoration: none; font-size: 14px; font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .menu-item i { color: var(--primary); font-size: 18px; width: 24px; text-align: center; }
        
        .btn-logout { width: 100%; background: #E53E3E; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; margin-top: 20px; display: none; box-shadow: 0 4px 10px rgba(229, 62, 62, 0.2); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto; width: 100%; max-width: 480px; background: var(--white); display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); border-radius: 20px 20px 0 0; z-index: 50; }
        .nav-item { color: #C4C4C4; display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; font-weight: 500; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-bar">
            <h2 style="font-size: 18px; margin: 0 auto; font-weight: 600; color: var(--text-dark);">Profil Pengguna</h2>
        </div>

        <div class="profile-card">
            <div class="avatar-container" id="areaFoto" style="display: none;">
                <div class="avatar" id="tampilAvatar">
                    <i class="fas fa-user"></i>
                </div>
                <input type="file" id="inputFoto" accept="image/*" style="display: none;" onchange="prosesGantiFoto(event)">
                <label for="inputFoto" class="btn-edit-foto"><i class="fas fa-camera"></i></label>
            </div>

            <h2 id="tampilNama">Belum Terdaftar</h2>
            <p id="tampilWA" style="font-weight: 600;">Silakan kembali ke Beranda untuk Mendaftar</p>
            <p id="tampilEmail"><i class="fas fa-envelope"></i> -</p>
            <p id="tampilAlamat"><i class="fas fa-map-marker-alt"></i> -</p>
        </div>

        <div class="menu-list">
            <a href="#" class="menu-item"><i class="fas fa-heart"></i> Makanan Favorit</a>
            <a href="#" class="menu-item"><i class="fas fa-star"></i> Penilaian Anda</a>
            <a href="#" class="menu-item"><i class="fas fa-headset"></i> Pusat Bantuan</a>
            
            <button class="btn-logout" id="btnKeluar" onclick="keluarAkun()">Keluar Akun</button>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Beranda</span></a>
            <a href="riwayat.html" class="nav-item"><i class="fas fa-receipt"></i><span>Riwayat</span></a>
            <a href="pesan.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>Pesan</span></a>
            <a href="profil.html" class="nav-item active"><i class="fas fa-user"></i><span>Akun</span></a>
        </nav>
    </div>

    <script>
        window.onload = function() { cekStatusLogin(); };

        function cekStatusLogin() {
            let nama = localStorage.getItem("userName");
            let wa = localStorage.getItem("userPhone");
            let email = localStorage.getItem("userEmail") || "Email belum diatur";
            let alamat = localStorage.getItem("userAlamat") || "Alamat belum diatur";
            let foto = localStorage.getItem("userPhoto");
            
            if (nama && wa) {
                // Tampilkan data diri
                document.getElementById("tampilNama").innerText = nama;
                document.getElementById("tampilWA").innerText = wa;
                document.getElementById("tampilEmail").innerHTML = `<i class="fas fa-envelope"></i> ${email}`;
                document.getElementById("tampilAlamat").innerHTML = `<i class="fas fa-map-marker-alt"></i> ${alamat}`;
                
                // Tampilkan menu interaktif
                document.getElementById("areaFoto").style.display = "block";
                document.getElementById("btnKeluar").style.display = "block";

                // Tampilkan foto jika sudah pernah upload
                if(foto) {
                    document.getElementById("tampilAvatar").innerHTML = `<img src="${foto}" alt="Foto Profil">`;
                }
            } else {
                document.getElementById("areaFoto").style.display = "none";
                document.getElementById("btnKeluar").style.display = "none";
            }
        }

        // FUNGSI GANTI FOTO (MENGGUNAKAN BASE64 LOKAL)
        function prosesGantiFoto(event) {
            let file = event.target.files[0];
            if(!file) return;

            // Membaca file gambar dari galeri HP
            let reader = new FileReader();
            reader.onload = function(e) {
                let base64String = e.target.result;
                
                // Simpan kode gambar ke memori HP
                localStorage.setItem("userPhoto", base64String);
                
                // Langsung perbarui tampilan
                document.getElementById("tampilAvatar").innerHTML = `<img src="${base64String}" alt="Foto Profil">`;
                alert("Foto profil berhasil diperbarui!");
            };
            
            // Eksekusi pembacaan gambar
            reader.readAsDataURL(file);
        }

        // FUNGSI LOGOUT
        function keluarAkun() {
            if (confirm("Apakah Anda yakin ingin menghapus sesi dari perangkat ini?")) {
                localStorage.removeItem("userName");
                localStorage.removeItem("userPhone");
                localStorage.removeItem("userEmail");
                localStorage.removeItem("userAlamat");
                localStorage.removeItem("userPhoto"); // Hapus foto juga
                localStorage.removeItem("userLokasi");
                
                // Lempar ke beranda untuk login ulang
                window.location.href = "index.html"; 
            }
        }
    </script>
</body>
</html>
