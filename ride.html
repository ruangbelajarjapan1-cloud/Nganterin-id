<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transportasi - Boyolali App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --primary: #0F4C81; --primary-dark: #0A365D; --accent: #F59E0B;
            --bg-gray: #F8F9FA; --white: #FFFFFF; --text-dark: #2D3748; --text-muted: #718096;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent;}
        body { background-color: #E5E5E5; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background-color: var(--white); height: 100vh; position: relative; overflow: hidden; display: flex; flex-direction: column;}
        
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; z-index: 1000; padding: 20px; display: flex; align-items: center; pointer-events: none;}
        .btn-back { background: var(--white); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); color: var(--text-dark); text-decoration: none; pointer-events: auto; font-size: 18px; transition: 0.2s;}
        .btn-back:active { transform: scale(0.95); }
        
        /* Area Peta */
        #map { flex: 1; width: 100%; z-index: 1; }
        
        /* Penanda Peta di Tengah UX */
        .center-marker { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%); z-index: 1000; font-size: 45px; color: var(--primary); pointer-events: none; transition: 0.2s ease-out; margin-top: -60px; text-shadow: 0 5px 10px rgba(0,0,0,0.3);}
        .center-marker.is-dropoff { color: #E53E3E; }
        
        /* Panel Bawah Pemesanan */
        .bottom-panel { background: var(--white); border-radius: 25px 25px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.1); padding: 25px 20px 30px 20px; z-index: 1000; position: relative; transition: 0.3s;}
        .sheet-handle { width: 40px; height: 5px; background: #E0E0E0; border-radius: 10px; margin: 0 auto 20px auto; }
        
        .address-box { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: var(--bg-gray); padding: 15px; border-radius: 15px; border: 1px solid #EAEAEA;}
        .address-box i { font-size: 20px; }
        .address-info p { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase;}
        .address-info h4 { font-size: 14px; color: var(--text-dark); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px;}

        .fare-box { display: none; justify-content: space-between; align-items: center; padding: 15px 0; border-top: 1px dashed #E0E0E0; margin-bottom: 15px;}
        .fare-info h3 { color: var(--text-dark); font-size: 16px; font-weight: 700;}
        .fare-info p { color: var(--text-muted); font-size: 12px; margin-top: 2px;}
        .fare-price { font-size: 22px; font-weight: 700; color: var(--primary);}

        .btn-action { width: 100%; padding: 16px; background: var(--primary); color: var(--white); border: none; border-radius: 15px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(15, 76, 129, 0.3); transition: 0.3s;}
        .btn-action.dropoff-mode { background: var(--accent); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); color: var(--white); }
        .btn-action:disabled { background: #A0AEC0; cursor: not-allowed; box-shadow: none; }

        #loader { display: none; font-size: 13px; color: var(--primary); text-align: center; margin-bottom: 15px; font-weight: 500; }

        /* GAYA UNTUK MODAL PEMBAYARAN */
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1001; opacity: 0; visibility: hidden; transition: 0.3s; }
        .overlay.active { opacity: 1; visibility: visible; }
        .payment-sheet { position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto; width: 100%; max-width: 480px; background: var(--white); z-index: 1002; padding: 30px 20px 40px 20px; border-radius: 20px 20px 0 0; transform: translateY(100%); transition: transform 0.4s ease; box-shadow: 0 -5px 20px rgba(0,0,0,0.15); }
        .payment-sheet.active { transform: translateY(0); }
        
        .payment-option { display: flex; align-items: center; gap: 15px; padding: 15px; border: 1px solid #EAEAEA; border-radius: 12px; margin-bottom: 15px; cursor: pointer; transition: 0.2s;}
        .payment-option.active { border-color: var(--primary); background: var(--primary-light); }
        .pay-icon { width: 40px; height: 40px; background: var(--white); border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .pay-detail { flex: 1; }
        .pay-detail h4 { font-size: 14px; color: var(--text-dark); margin-bottom: 2px;}
        .pay-detail p { font-size: 11px; color: var(--text-muted);}
        .pay-radio { width: 20px; height: 20px; border: 2px solid #ccc; border-radius: 50%; }
        .payment-option.active .pay-radio { border-color: var(--primary); background: var(--primary); position: relative;}
        .payment-option.active .pay-radio::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background: white; border-radius: 50%;}
    </style>
</head>
<body>
    <div class="app-container">
        
        <div class="top-bar">
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        </div>

        <div id="map"></div>
        
        <i class="fas fa-map-marker-alt center-marker" id="centerMarker"></i>

        <div class="bottom-panel" id="bottomPanel">
            <div class="sheet-handle"></div>
            
            <div id="loader"><i class="fas fa-spinner fa-spin"></i> Menghitung rute presisi...</div>

            <div class="address-box">
                <i class="fas fa-dot-circle" style="color: var(--primary);" id="iconTitik"></i>
                <div class="address-info">
                    <p id="labelTitik">Geser peta untuk menentukan</p>
                    <h4 id="teksLokasi">Mencari lokasi Anda...</h4>
                </div>
            </div>

            <div class="fare-box" id="fareBox">
                <div class="fare-info">
                    <h3>Boyolali Ride</h3>
                    <p id="teksJarak">Jarak: - km</p>
                </div>
                <div class="fare-price" id="teksHarga">Rp 0</div>
            </div>

            <button class="btn-action" id="btnMain" onclick="prosesLangkah()">Set Lokasi Jemput</button>
        </div>

        <div class="overlay" id="paymentOverlay" onclick="tutupPayment()"></div>
        <div class="payment-sheet" id="paymentSheet">
            <div class="sheet-handle"></div>
            <h2 style="color: var(--text-dark); font-size: 20px; margin-bottom: 20px;">Pilih Pembayaran</h2>
            
            <div class="payment-option" onclick="pilihMetode('Tunai', this)">
                <div class="pay-icon"><i class="fas fa-money-bill-wave" style="color: #059669;"></i></div>
                <div class="pay-detail">
                    <h4>Uang Tunai (Cash)</h4>
                    <p>Bayar langsung ke pengemudi</p>
                </div>
                <div class="pay-radio"></div>
            </div>

            <div class="payment-option" onclick="pilihMetode('QRIS', this)">
                <div class="pay-icon"><i class="fas fa-qrcode" style="color: var(--primary);"></i></div>
                <div class="pay-detail">
                    <h4>QRIS (Semua E-Wallet)</h4>
                    <p>GoPay, OVO, Dana, M-Banking, dll.</p>
                </div>
                <div class="pay-radio"></div>
            </div>

            <div id="qrisArea" style="display: none; text-align: center; margin-top: 20px; padding: 20px; background: var(--bg-gray); border-radius: 12px; border: 1px dashed #ccc;">
                <p style="font-size: 13px; color: var(--text-dark); font-weight: 600; margin-bottom: 10px;">Scan QRIS Perusahaan:</p>
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/QR_code_for_mobile_English_Wikipedia.svg" alt="QRIS" style="width: 150px; height: 150px; border-radius: 8px; margin-bottom: 10px;">
                <p style="font-size: 11px; color: var(--text-muted);">Total: <strong style="color: var(--primary);" id="tagihanQRIS">Rp 0</strong></p>
            </div>

            <button class="btn-action" style="margin-top: 20px;" onclick="konfirmasiPesananFinal()">Konfirmasi & Pesan</button>
        </div>

    </div>

    <script>
        // 1. INISIALISASI PETA
        let map = L.map('map', {zoomControl: false}).setView([-7.5333, 110.6000], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap', maxZoom: 19
        }).addTo(map);

        // 2. VARIABEL STATE
        let modePeta = "JEMPUT"; 
        let titikJemput = null;
        let titikTujuan = null;
        let namaJemput = "Lokasi Pilihan";
        let namaTujuan = "Tujuan Pilihan";
        let hargaFinalSistem = "Rp 0";

        const elemenTeksLokasi = document.getElementById("teksLokasi");
        const elemenLabelTitik = document.getElementById("labelTitik");
        const elemenIconTitik = document.getElementById("iconTitik");
        const btnMain = document.getElementById("btnMain");
        const centerMarker = document.getElementById("centerMarker");
        const fareBox = document.getElementById("fareBox");
        let polyline; 

        // 3. DETEKSI PETA BACA ALAMAT
        map.on('moveend', async function() {
            if (modePeta === "PESAN") return; 

            let center = map.getCenter();
            elemenTeksLokasi.innerText = "Membaca alamat...";

            try {
                let response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${center.lat}&lon=${center.lng}`);
                let data = await response.json();
                
                let namaJalan = data.address.road || data.address.neighbourhood || data.address.suburb || data.address.village || "Lokasi pada peta";
                elemenTeksLokasi.innerText = namaJalan;
                
                if (modePeta === "JEMPUT") { titikJemput = center; namaJemput = namaJalan; } 
                else if (modePeta === "TUJUAN") { titikTujuan = center; namaTujuan = namaJalan; }
            } catch(e) {
                elemenTeksLokasi.innerText = "Lokasi Terpilih";
            }
        });

        // 4. LOKASI GPS SAAT INI
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                map.setView([position.coords.latitude, position.coords.longitude], 17);
            }, () => { elemenTeksLokasi.innerText = "Geser peta secara manual"; });
        }

        // 5. LOGIKA TOMBOL PETA UTAMA
        function prosesLangkah() {
            if (modePeta === "JEMPUT") {
                if (!titikJemput) titikJemput = map.getCenter();
                
                modePeta = "TUJUAN";
                centerMarker.classList.add("is-dropoff");
                elemenIconTitik.style.color = "#E53E3E";
                elemenIconTitik.className = "fas fa-map-marker-alt";
                elemenLabelTitik.innerText = "Geser peta untuk menentukan";
                elemenTeksLokasi.innerText = "Mencari titik tujuan...";
                
                btnMain.innerText = "Set Tujuan Pengantaran";
                btnMain.classList.add("dropoff-mode");
                map.panBy([0, -80]); 

            } else if (modePeta === "TUJUAN") {
                if (!titikTujuan) titikTujuan = map.getCenter();
                
                modePeta = "PESAN";
                centerMarker.style.display = "none"; 
                document.getElementById("loader").style.display = "block";
                btnMain.disabled = true;
                
                // MENGHITUNG RUTE OSRM
                let urlRute = `https://router.project-osrm.org/route/v1/driving/${titikJemput.lng},${titikJemput.lat};${titikTujuan.lng},${titikTujuan.lat}?overview=full&geometries=geojson`;

                fetch(urlRute)
                .then(response => response.json())
                .then(data => {
                    document.getElementById("loader").style.display = "none";
                    btnMain.disabled = false;
                    
                    if(data.routes && data.routes.length > 0) {
                        let rute = data.routes[0];
                        let jarakKm = (rute.distance / 1000).toFixed(1);
                        
                        let ruteKoordinat = rute.geometry.coordinates.map(coord => [coord[1], coord[0]]);
                        polyline = L.polyline(ruteKoordinat, {color: '#0F4C81', weight: 5}).addTo(map);
                        map.fitBounds(polyline.getBounds(), {padding: [50, 50]});
                        
                        L.circleMarker(titikJemput, {color: '#0F4C81', fillOpacity: 1, radius: 6}).addTo(map);
                        L.marker(titikTujuan).addTo(map);

                        // PERHITUNGAN HARGA 
                        let tarifDasar = 5000;
                        let tarifPerKm = 3000;
                        let totalHarga = tarifDasar + Math.round(jarakKm * tarifPerKm);
                        hargaFinalSistem = `Rp ${totalHarga.toLocaleString('id-ID')}`;
                        
                        document.getElementById("teksJarak").innerText = `Jarak Tempuh: ${jarakKm} km`;
                        document.getElementById("teksHarga").innerText = hargaFinalSistem;
                        
                        fareBox.style.display = "flex";
                        elemenLabelTitik.innerText = "Tujuan Anda:";
                        elemenTeksLokasi.innerText = namaTujuan;
                        elemenIconTitik.className = "fas fa-map-marker-alt";
                        
                        btnMain.innerText = "Pilih Metode Pembayaran";
                        btnMain.classList.remove("dropoff-mode");
                        btnMain.style.background = "#0F4C81";
                    } else {
                        alert("Gagal menemukan rute kendaraan.");
                        location.reload();
                    }
                }).catch(err => {
                    alert("Koneksi gagal.");
                    document.getElementById("loader").style.display = "none";
                    btnMain.disabled = false;
                });

            } else if (modePeta === "PESAN") {
                // PASTIKAN USER LOGIN SEBELUM BAYAR
                if(!localStorage.getItem("userName")) {
                    alert("Anda belum login. Silakan kembali ke Beranda untuk masuk akun.");
                    return;
                }
                
                // MUNCULKAN MODAL PEMBAYARAN
                document.getElementById('paymentOverlay').classList.add('active');
                document.getElementById('paymentSheet').classList.add('active');
                document.getElementById('tagihanQRIS').innerText = hargaFinalSistem;
            }
        }

        // 6. LOGIKA MODAL PEMBAYARAN (QRIS & TUNAI)
        let metodePembayaran = "";

        function tutupPayment() {
            document.getElementById('paymentOverlay').classList.remove('active');
            document.getElementById('paymentSheet').classList.remove('active');
        }

        function pilihMetode(metode, elemen) {
            metodePembayaran = metode;
            document.querySelectorAll('.payment-option').forEach(el => el.classList.remove('active'));
            elemen.classList.add('active');

            if(metode === "QRIS") {
                document.getElementById('qrisArea').style.display = "block";
            } else {
                document.getElementById('qrisArea').style.display = "none";
            }
        }

        function konfirmasiPesananFinal() {
            if (metodePembayaran === "") {
                alert("Silakan pilih metode pembayaran terlebih dahulu.");
                return;
            }
            
            tutupPayment();
            let layananDetail = "Transportasi (Ride) - " + metodePembayaran;
            
            // Eksekusi pesanan ke Google Sheets (app.js)
            if (typeof kirimPesanan === "function") {
                kirimPesanan(layananDetail, namaJemput, namaTujuan, hargaFinalSistem);
            } else {
                alert(`Memproses Pesanan...\n\nJemput: ${namaJemput}\nTujuan: ${namaTujuan}\nTarif: ${hargaFinalSistem}\nMetode: ${metodePembayaran}\n\nData siap diteruskan ke server!`);
                window.location.href = "riwayat.html";
            }
        }
    </script>
    
    <script src="app.js"></script>
</body>
</html>
